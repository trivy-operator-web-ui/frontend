name: 📦 Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: 📦 SemVer Release
    runs-on: ubuntu-latest
    steps:
      - name: 🔽 Checkout repository code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: 🤖 Configure bot user
        run: |
          git config user.name "github-actions[bot]"
          git config --global user.name "github-actions[bot]"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 🛠️ Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔒 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: 🛠️ Install Cocogitto
        run: |
          wget https://github.com/cocogitto/cocogitto/releases/download/7.0.0/cocogitto-7.0.0-x86_64-unknown-linux-musl.tar.gz
          tar -xf cocogitto-7.0.0-x86_64-unknown-linux-musl.tar.gz
          sudo mv x86_64-unknown-linux-musl/cog /usr/bin
          rm -r cocogitto-7.0.0-x86_64-unknown-linux-musl.tar.gz x86_64-unknown-linux-musl

      - name: 📦 Release and Publish
        run: |
          cog bump --auto --skip-ci
