<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource" matSort>

    <!-- Position Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Name </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <!-- Position Column -->
    <ng-container matColumnDef="critical">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number">critical</th>
      <td mat-cell *matCellDef="let element"> {{element.summary.criticalCount}} </td>
    </ng-container>

        <!-- Position Column -->
    <ng-container matColumnDef="high">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number"> No. high </th>
      <td mat-cell *matCellDef="let element"> {{element.summary.highCount}} </td>
    </ng-container>

        <!-- Position Column -->
    <ng-container matColumnDef="medium">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number"> No. medium </th>
      <td mat-cell *matCellDef="let element"> {{element.summary.mediumCount}} </td>
    </ng-container>

        <!-- Position Column -->
    <ng-container matColumnDef="low">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number"> No. low </th>
      <td mat-cell *matCellDef="let element"> {{element.summary.lowCount}} </td>
    </ng-container>


        <!-- Position Column -->
    <ng-container matColumnDef="none">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number"> No. none </th>
      <td mat-cell *matCellDef="let element"> {{element.summary.noneCount}} </td>
    </ng-container>

    <ng-container matColumnDef="unknown">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number"> No. Unknown </th>
      <td mat-cell *matCellDef="let element"> {{element.summary.unknownCount}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                 showFirstLastButtons
                 aria-label="Select page of vulnerability reports">
  </mat-paginator>
</div>
