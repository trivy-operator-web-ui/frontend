<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource" matSort>

    <!-- Position Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td class="name-value" routerLink = "{{element.uid}}" mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <!-- Position Column -->
    <ng-container matColumnDef="criticalCount">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number">Critical</th>
      <td mat-cell *matCellDef="let element"> {{element.criticalCount}} </td>
    </ng-container>

        <!-- Position Column -->
    <ng-container matColumnDef="highCount">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number">High</th>
      <td mat-cell *matCellDef="let element"> {{element.highCount}} </td>
    </ng-container>

        <!-- Position Column -->
    <ng-container matColumnDef="mediumCount">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number">Medium</th>
      <td mat-cell *matCellDef="let element"> {{element.mediumCount}} </td>
    </ng-container>

        <!-- Position Column -->
    <ng-container matColumnDef="lowCount">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number">Low</th>
      <td mat-cell *matCellDef="let element"> {{element.lowCount}} </td>
    </ng-container>


        <!-- Position Column -->
    <ng-container matColumnDef="noneCount">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number">None</th>
      <td mat-cell *matCellDef="let element"> {{element.noneCount}} </td>
    </ng-container>

    <ng-container matColumnDef="unknownCount">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by number">Unknown</th>
      <td mat-cell *matCellDef="let element"> {{element.unknownCount}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                 showFirstLastButtons
                 aria-label="Select page of vulnerability reports">
  </mat-paginator>
</div>
