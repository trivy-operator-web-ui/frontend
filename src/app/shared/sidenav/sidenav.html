<mat-drawer-container class="main-container" autosize>
  <mat-drawer #drawer class="sidenav-content" mode="over">
    <mat-list class="page-list">
      <mat-list-item
        (click)="drawer.close()"
        routerLink="/vulnerability-reports-overview"
      >
        <p class="list-item">Vulnerability Reports</p>
      </mat-list-item>
      <mat-list-item
        (click)="drawer.close()"
        routerLink="/sbom-reports-overview"
      >
        <p class="list-item">SBOM Reports</p>
      </mat-list-item>
    </mat-list>
  </mat-drawer>
  <mat-icon class="menu-icon" (click)="drawer.toggle()">menu</mat-icon>
  <router-outlet></router-outlet>
</mat-drawer-container>
